name: Supabase Keep-Alive

# Supabase 무료 플랜은 약 7일간 활동이 없으면 프로젝트를 자동 일시정지(pause)한다.
# 이 워크플로우는 주기적으로 public 테이블(stock_cache)에 가벼운 SELECT를 날려
# "활동 중" 상태를 유지함으로써 자동 일시정지를 방지한다.

on:
  schedule:
    # 매주 월·목 00:10 UTC (최대 공백 ~3~4일 < 7일). 분 단위는 부하 분산을 위해 비정시로 설정.
    - cron: "10 0 * * 1,4"
  workflow_dispatch: {} # 수동 실행 버튼

jobs:
  ping:
    runs-on: ubuntu-latest
    steps:
      - name: Ping Supabase REST API
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
        run: |
          if [ -z "$SUPABASE_URL" ] || [ -z "$SUPABASE_ANON_KEY" ]; then
            echo "::error::SUPABASE_URL / SUPABASE_ANON_KEY secret이 설정되지 않았습니다."
            exit 1
          fi

          # stock_cache 는 RLS상 anon 읽기가 허용된 테이블. 1행만 가볍게 조회한다.
          status=$(curl -s -o /tmp/body.txt -w "%{http_code}" \
            "$SUPABASE_URL/rest/v1/stock_cache?select=symbol&limit=1" \
            -H "apikey: $SUPABASE_ANON_KEY" \
            -H "Authorization: Bearer $SUPABASE_ANON_KEY")

          echo "HTTP status: $status"
          echo "Response: $(cat /tmp/body.txt)"

          # 200 OK면 DB가 살아있고 쿼리 성공 → keep-alive 성공
          if [ "$status" = "200" ]; then
            echo "✅ Keep-alive 성공: Supabase가 활동을 기록했습니다."
          else
            echo "::error::Keep-alive 실패 (HTTP $status). 프로젝트가 일시정지 상태이거나 키가 잘못됐을 수 있습니다."
            exit 1
          fi
