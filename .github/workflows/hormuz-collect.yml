name: Hormuz AIS Collect (hourly)

# Vercel Hobby 플랜은 cron을 하루 1회까지만 허용하므로, 매시간 수집을
# GitHub Actions cron으로 대신 수행한다. /api/chokepoint/collect 는
# AIS 스냅샷을 Supabase에 누적 저장하므로, 이 호출은 동시에
# Supabase 자동 일시정지(7일 비활성)도 방지하는 keep-alive 역할을 한다.

on:
  schedule:
    - cron: "5 * * * *" # 매시간 :05 (UTC)
  workflow_dispatch: {} # 수동 실행 버튼

jobs:
  collect:
    runs-on: ubuntu-latest
    steps:
      - name: Call collect endpoint
        env:
          # CRON_SECRET 이 Vercel/저장소에 설정돼 있으면 인증 헤더로 전달된다.
          # 엔드포인트가 secret 미설정(공개)이면 빈 값이어도 200으로 통과한다.
          CRON_SECRET: ${{ secrets.CRON_SECRET }}
        run: |
          url="https://yongstcok.vercel.app/api/chokepoint/collect"
          status=$(curl -s -o /tmp/body.txt -w "%{http_code}" --max-time 40 \
            -H "Authorization: Bearer ${CRON_SECRET}" \
            "$url")

          echo "HTTP status: $status"
          echo "Response: $(cat /tmp/body.txt)"

          if [ "$status" = "200" ]; then
            echo "✅ 수집 성공 (Supabase 활동 기록 = keep-alive 겸용)"
          elif [ "$status" = "401" ]; then
            echo "::error::401 Unauthorized — CRON_SECRET secret 값이 Vercel의 CRON_SECRET 과 일치하는지 확인하세요."
            exit 1
          else
            echo "::error::수집 실패 (HTTP $status)"
            exit 1
          fi
